services:
  openclaw-gateway:
    image: ghcr.io/31337ghost/openclaw:latest
    restart: unless-stopped
    cap_drop: ["ALL"]
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    volumes:
      - ./data/.openclaw:/home/node/.openclaw
      - ./data/.npm-global:/home/node/.npm-global
    environment:
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN:-}
