services:
  openclaw-gateway:
    image: ghcr.io/openclaw/openclaw:${OPENCLAW_IMAGE_TAG:-2026.3.2}
    init: true
    restart: unless-stopped
    cap_drop: ["ALL"]
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    ports:
      - "${OPENCLAW_GATEWAY_PORT:-18789}:18789"
    volumes:
      - openclaw_home:/home/node
      - ./data/.openclaw:/home/node/.openclaw

volumes:
  openclaw_home:
