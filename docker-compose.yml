services:
  openclaw-gateway:
    image: ghcr.io/31337ghost/openclaw:latest
    init: true
    restart: unless-stopped
    cap_drop: ["ALL"]
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    ports:
      - "${OPENCLAW_GATEWAY_PORT:-18789}:18789"
    environment:
      - npm_config_cache=/home/node/.openclaw/.npm
    volumes:
      - ./data:/home/node/.openclaw
      - ./ssh:/home/node/.ssh
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:18789/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s
    labels:
      - com.centurylinklabs.watchtower.enable=true

